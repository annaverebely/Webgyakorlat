<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Naprendszer bolygói</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

.ur {
  background: black;
}

.palya {
  fill: none;
  stroke: #555;
  stroke-dasharray: 4 4;
}

.bolygo {
  display: none;
}

.bolygo-label {
  display: none;
  fill: white;
  font-size: 12px;
}

.napocska {
  fill: gold;
}

.saturnus-gyuru {
  display: none;
  fill: none;
  stroke: #c5a457;
  stroke-width: 3px;
}

button {
  margin: 20px;
  padding: 10px;
}

.button-container {
  display: flex;
  justify-content: center;
  margin: 20px;
}
</style>
</head>

<body>


<h2>Naprendszer bolygói</h2>

<div class="button-container">
  <button id="btn">Nézzük a bolygókat</button>
</div>

<svg width="800" height="800" viewBox="0 0 800 800" class="ur">

<!-- Nap -->
<circle cx="400" cy="400" r="40" class="napocska"/>

<!-- Pályák -->
<circle cx="400" cy="400" r="70" class="palya"/>
<circle cx="400" cy="400" r="100" class="palya"/>
<circle cx="400" cy="400" r="130" class="palya"/>
<circle cx="400" cy="400" r="160" class="palya"/>
<circle cx="400" cy="400" r="190" class="palya"/>
<circle cx="400" cy="400" r="210" class="palya"/>
<circle cx="400" cy="400" r="240" class="palya"/>
<circle cx="400" cy="400" r="270" class="palya"/>
<circle cx="400" cy="400" r="300" class="palya"/>

<!-- Merkúr -->
<circle cx="400" cy="330" r="5" fill="gray" class="bolygo"/>
<text x="405" y="325" class="bolygo-label">Merkúr</text>

<!-- Vénusz -->
<circle cx="460" cy="320" r="7" fill="#d9b38c" class="bolygo"/>
<text x="465" y="315" class="bolygo-label">Vénusz</text>

<!-- Föld -->
<circle cx="520" cy="450" r="8" fill="deepskyblue" class="bolygo"/>
<text x="525" y="465" class="bolygo-label">Föld</text>

<!-- Mars -->
<circle cx="295" cy="520" r="6" fill="red" class="bolygo"/>
<text x="270" y="530" class="bolygo-label">Mars</text>

<!-- Jupiter -->
<circle cx="555" cy="300" r="14" fill="#d2a679" class="bolygo"/>
<text x="555" y="285" class="bolygo-label">Jupiter</text>

<!-- Szaturnusz -->
<ellipse cx="190" cy="400" rx="20" ry="7" class="saturnus-gyuru"/>
<circle cx="190" cy="400" r="12" fill="#e6c68a" class="bolygo"/>
<text x="160" y="380" class="bolygo-label">Szaturnusz</text>

<!-- Uránusz -->
<circle cx="600" cy="535" r="10" fill="#7fffd4" class="bolygo"/>
<text x="610" y="530" class="bolygo-label">Uránusz</text>

<!-- Neptunusz -->
<circle cx="130" cy="420" r="10" fill="royalblue" class="bolygo"/>
<text x="100" y="400" class="bolygo-label">Neptunusz</text>

<!-- Plútó -->
<circle cx="400" cy="100" r="4" fill="#ccc" class="bolygo"/>
<text x="390" y="95" class="bolygo-label">Plútó</text>

</svg>

<script>
const planets = document.querySelectorAll(".bolygo");
const labels = document.querySelectorAll(".bolygo-label");
const saturnRing = document.querySelector(".saturnus-gyuru");

let index = 0;

document.getElementById("btn").addEventListener("click", () => {
  if (index < planets.length) {
    planets[index].style.display = "block";
    labels[index].style.display = "block";

    if (index === 5) {
      saturnRing.style.display = "block";
    }

    index++;
  } else {
    alert("Nincs több bolygó a Naprendszerben!");
  }
});
</script>

</body>
</html>
